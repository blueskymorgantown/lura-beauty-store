<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 120" width="300" height="120">
  <defs>
    <style>
      .logo-text { font-family: 'Cormorant Garamond', Georgia, serif; }
      .sub-text { font-family: 'Jost', Arial, sans-serif; }
    </style>
  </defs>
  <!-- Rose line art -->
  <g transform="translate(230,10)" opacity="0.7">
    <!-- stem -->
    <path d="M35,110 Q30,80 32,50 Q34,30 38,15" stroke="#c9a98a" stroke-width="1.2" fill="none"/>
    <!-- leaves -->
    <path d="M32,70 Q15,60 10,45 Q22,48 32,58" stroke="#c9a98a" stroke-width="1" fill="none"/>
    <path d="M34,55 Q50,42 55,28 Q44,34 36,44" stroke="#c9a98a" stroke-width="1" fill="none"/>
    <!-- rose petals -->
    <ellipse cx="38" cy="12" rx="5" ry="8" stroke="#c9a98a" stroke-width="1" fill="none"/>
    <path d="M33,10 Q28,5 30,0 Q36,4 38,8" stroke="#c9a98a" stroke-width="1" fill="none"/>
    <path d="M43,10 Q50,5 48,0 Q42,4 38,8" stroke="#c9a98a" stroke-width="1" fill="none"/>
    <path d="M35,6 Q32,0 38,0 Q44,0 41,6" stroke="#c9a98a" stroke-width="1" fill="none"/>
  </g>
  <!-- Horizontal rule -->
  <line x1="10" y1="72" x2="215" y2="72" stroke="#c9a98a" stroke-width="0.5"/>
  <!-- LURA text -->
  <text x="12" y="65" class="logo-text" font-size="52" font-weight="300" letter-spacing="10" fill="#1a1510">LURA</text>
  <!-- Beauty Collection -->
  <text x="16" y="90" class="sub-text" font-size="13" font-weight="300" letter-spacing="3" fill="#6b5f54" font-style="italic" font-family="Georgia,serif">Beauty Collection</text>
</svg>
